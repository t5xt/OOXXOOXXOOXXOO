<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>lurki.ng</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Rajdhani', sans-serif;
overflow:hidden;
}

/* ENTER SCREEN */

#enter-screen{
position:absolute;
text-align:center;
opacity:1;
transition:opacity 1.5s ease;
}

.title{
font-size:28px;
letter-spacing:3px;
margin-bottom:25px;
}

.enter-btn{
border:1px solid white;
padding:10px 35px;
display:inline-block;
cursor:pointer;
letter-spacing:2px;
transition:0.2s;
}

.enter-btn:hover{
background:white;
color:black;
}

/* GIF */

#gif{
opacity:0;
transition:opacity 1.5s ease;
}

#gif img{
max-width:420px;
height:auto;
}

/* animation states */

.fade-out{
opacity:0;
}

.fade-in{
opacity:1;
}

</style>
</head>

<body>

<div id="enter-screen">

<div class="title">lurki.ng</div>

<div class="enter-btn" onclick="enterSite()">enter</div>

</div>

<div id="gif">

<img src="eye.gif">

</div>

<script>

function enterSite(){

document.getElementById("enter-screen").classList.add("fade-out");
document.getElementById("gif").classList.add("fade-in");

}

</script>

</body>
</html>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
color:#fff;
font-family:pf;
overflow-x:hidden;
}

canvas{position:fixed;inset:0;z-index:0;opacity:.35}

.enter{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#000;
z-index:10;
transition:.8s ease;
}

.enter.hide{
opacity:0;
filter:blur(20px);
pointer-events:none;
}

.enter h1{
font-family:enter;
font-size:clamp(50px,6vw,90px);
}

.enter button{
margin-top:20px;
padding:8px 22px;
border:1px solid rgba(255,255,255,.2);
background:transparent;
color:#fff;
font-size:10px;
letter-spacing:.2em;
cursor:pointer;
}

.enter button:hover{background:#fff;color:#000}

.wrap{
position:relative;
z-index:2;
padding:100px 40px;
opacity:0;
transform:translateY(20px);
transition:.6s ease;
}

.wrap.show{
opacity:1;
transform:translateY(0);
}

.title{
text-align:center;
font-size:clamp(70px,10vw,150px);
margin-bottom:70px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
max-width:1200px;
margin:auto;
}

.card{
background:#0b0b0b;
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:22px;
transition:.25s;
transform-style:preserve-3d;
position:relative;
overflow:hidden;
}

.card:hover{
border-color:rgba(255,255,255,.18);
}

.card::before{
content:"";
position:absolute;
inset:0;
border-radius:inherit;
background:radial-gradient(circle at var(--x,50%) var(--y,50%),rgba(255,255,255,.12),transparent 60%);
opacity:0;
transition:.3s;
}

.card:hover::before{opacity:1}

.avatar{
width:58px;height:58px;border-radius:10px;overflow:hidden;margin-bottom:14px;
}

.avatar img{width:100%;height:100%;object-fit:cover}

.name{font-size:18px}
.handle{font-size:11px;color:rgba(255,255,255,.4)}

.bio{margin-top:10px;font-size:12px;color:rgba(255,255,255,.6);min-height:16px}

.links{display:flex;gap:8px;margin-top:14px}

.links a{
width:30px;height:30px;
display:flex;align-items:center;justify-content:center;
border:1px solid rgba(255,255,255,.1);
transition:.2s;
}

.links a:hover{background:#fff}
.links svg{width:16px;height:16px}
.links a:hover svg{filter:invert(1)}
</style>

<script>
function go(){
const e=document.getElementById("enter")
e.classList.add("hide")
setTimeout(()=>{e.style.display="none";document.getElementById("main").classList.add("show")},700)

const a=new Audio("https://files.catbox.moe/qrui0p.mp3")
a.currentTime=24
a.volume=0
a.play()
let v=0
let f=setInterval(()=>{v+=0.02;a.volume=v;if(v>=0.5)clearInterval(f)},100)
}

document.querySelectorAll(".card").forEach(card=>{
const bio=card.querySelector(".bio")
const text=card.dataset.bio
let t

card.addEventListener("mousemove",e=>{
const r=card.getBoundingClientRect()
const x=(e.clientX-r.left)/r.width
const y=(e.clientY-r.top)/r.height
card.style.setProperty("--x",x*100+"%")
card.style.setProperty("--y",y*100+"%")
card.style.transform=`rotateX(${-(y-.5)*10}deg) rotateY(${(x-.5)*12}deg)`
})

card.addEventListener("mouseleave",()=>{
card.style.transform=""
clearInterval(t)
bio.textContent=""
})

card.addEventListener("mouseenter",()=>{
let i=0
bio.textContent=""
clearInterval(t)
t=setInterval(()=>{
bio.textContent=text.slice(0,i++)
if(i>text.length)clearInterval(t)
},20)
})
})

const c=document.getElementById("snow")
const ctx=c.getContext("2d")
let mx=0,my=0

function resize(){c.width=innerWidth;c.height=innerHeight}
let f=[]

function init(){
for(let i=0;i<140;i++){
f.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,v:Math.random()*0.6})
}
}

function draw(){
ctx.clearRect(0,0,c.width,c.height)
f.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,6.28)
ctx.fillStyle="rgba(255,255,255,.5)"
ctx.fill()
s.y+=s.v
s.x+=mx*0.0003
if(s.y>c.height)s.y=0
})
requestAnimationFrame(draw)
}

document.addEventListener("mousemove",e=>{
mx=e.clientX-innerWidth/2
my=e.clientY-innerHeight/2
})

resize();init();draw()
</script>
